<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Felices 22</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    overflow:hidden;
    height:100vh;
    background:linear-gradient(135deg,#7f0035,#da203f,#fb9c9f);
    font-family:Arial, sans-serif;
    display:flex;
    justify-content:center;
    align-items:center;
    text-align:center;
}

/* CONTENIDO */
.container{
    position:relative;
    z-index:10;
    width:90%;
    max-width:900px;
}

h1{
    font-size:80px;
    color:white;
    text-shadow:4px 4px 8px rgba(0,0,0,.3);
    animation:zoom 2s infinite alternate;
}

p{
    margin-top:20px;
    font-size:24px;
    color:white;
    line-height:1.6;
    text-shadow:2px 2px 5px rgba(0,0,0,.2);
}

/* Pastel */
.cake{
    position:relative;
    width:220px;
    height:220px;
    margin:40px auto;
}

.layer1,.layer2,.layer3{
    position:absolute;
    left:50%;
    transform:translateX(-50%);
    border-radius:20px;
}

.layer1{
    bottom:0;
    width:220px;
    height:70px;
    background:#8b4513;
}
.layer2{
    bottom:60px;
    width:180px;
    height:60px;
    background:#d2691e;
}
.layer3{
    bottom:110px;
    width:140px;
    height:55px;
    background:#ffb6c1;
}

/* Velas */
.candle{
    position:absolute;
    width:12px;
    height:45px;
    background:white;
    top:10px;
    border-radius:5px;
}

.c1{left:70px;}
.c2{left:104px;}
.c3{left:138px;}

.flame{
    position:absolute;
    width:14px;
    height:22px;
    background:gold;
    border-radius:50%;
    top:-18px;
    left:-1px;
    animation:flicker .7s infinite alternate;
}

/* Flotantes */
.float{
    position:absolute;
    font-size:40px;
    animation:floatUp linear infinite;
    opacity:.9;
}

@keyframes floatUp{
    from{
        transform:translateY(100vh) rotate(0deg);
    }
    to{
        transform:translateY(-120vh) rotate(360deg);
    }
}

/* Confeti */
.confetti{
    position:absolute;
    width:10px;
    height:10px;
    background:white;
    top:-20px;
    animation:fall linear infinite;
}

@keyframes fall{
    from{
        transform:translateY(-20px) rotate(0deg);
    }
    to{
        transform:translateY(110vh) rotate(720deg);
    }
}

@keyframes flicker{
    from{transform:scale(1);}
    to{transform:scale(1.3);}
}

@keyframes zoom{
    from{transform:scale(1);}
    to{transform:scale(1.08);}
}
</style>
</head>

<body>

<div class="container">
    <h1>🎉 FELICES 22 🎉<br>
        HAPPY BIRTHDAY <br>
    </h1>

    <p>
        Dios le regale más años con salud y bendiciones,<br>
        cumpliendo cada sueño y meta que tenga en su corazón,<br>
        y siga cumpliendo el propósito que Dios creó en usted.<br>
        La quiero aunque no se bañe ni me ayude a asear haha 
    </p>

    <!-- Pastel -->
    <div class="cake">
        <div class="layer1"></div>
        <div class="layer2"></div>
        <div class="layer3"></div>

        <div class="candle c1"><div class="flame"></div></div>
        <div class="candle c2"><div class="flame"></div></div>
        <div class="candle c3"><div class="flame"></div></div>
    </div>
</div>

<script>
/* Emojis flotando */
const emojis = ["🎈","💖","🎂","🎉","🥳","🩷","🎁"];

for(let i=0;i<35;i++){
    let item = document.createElement("div");
    item.className="float";
    item.innerHTML=emojis[Math.floor(Math.random()*emojis.length)];
    item.style.left=Math.random()*100+"%";
    item.style.animationDuration=(5+Math.random()*6)+"s";
    item.style.fontSize=(25+Math.random()*35)+"px";
    document.body.appendChild(item);
}

/* Confeti */
for(let i=0;i<120;i++){
    let c=document.createElement("div");
    c.className="confetti";
    c.style.left=Math.random()*100+"%";
    c.style.background=`hsl(${Math.random()*360},100%,60%)`;
    c.style.animationDuration=(3+Math.random()*4)+"s";
    c.style.width=(5+Math.random()*8)+"px";
    c.style.height=c.style.width;
    document.body.appendChild(c);
}
</script>

</body>
</html>
